name: Deploy to Amazon EKS

on:
  push:
    branches:
      - master

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 125969980889.dkr.ecr.us-east-1.amazonaws.com
  EKS_CLUSTER: home-security-cluster

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Listener
        run: |
          docker build --platform linux/amd64 -t $ECR_REGISTRY/home-sensor-listener:latest ./home-sensor-listener
          docker push $ECR_REGISTRY/home-sensor-listener:latest

      - name: Build and Push Processor
        run: |
          docker build --platform linux/amd64 -t $ECR_REGISTRY/home-sensor-processor:latest ./home-sensor-processor
          docker push $ECR_REGISTRY/home-sensor-processor:latest

      - name: Build and Push Alert Service
        run: |
          docker build --platform linux/amd64 -t $ECR_REGISTRY/home-sensor-alert-service:latest ./home-sensor-alert-service
          docker push $ECR_REGISTRY/home-sensor-alert-service:latest

      - name: Update Kubeconfig
        run: |
          aws eks update-kubeconfig --name $EKS_CLUSTER --region $AWS_REGION

      - name: Deploy to EKS
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/service-account.yaml
          kubectl apply -f k8s/mesh.yaml
          kubectl apply -f k8s/home-sensor-listener.yaml
          kubectl apply -f k8s/home-sensor-processor.yaml
          kubectl apply -f k8s/home-sensor-alert-service.yaml
          kubectl apply -f k8s/virtual-nodes.yaml
          kubectl apply -f k8s/virtual-services.yaml
          kubectl rollout restart deployment -n home-security
